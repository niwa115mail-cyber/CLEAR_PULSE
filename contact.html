<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">

  <title>CLEAR PULSE（クリア・パルス）| 思考を再起動する強炭酸紅茶</title>
  <meta name="author" content="akeminiwa">
  <meta name="description" content="思考を再起動する、紅茶専門店の強炭酸フレーバーティー「CLEAR PULSE（クリア・パルス）」。研ぎ澄まされた茶葉の香りと強炭酸の刺激が、あなたのパフォーマンスを整える。洗練された新しいティー体験をお届けします。">
  <link rel="icon" href="images/favicon.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="wrapper">

    <header>
      <h1><a href="index.html"><img src="images/drop_1.png" alt="CLEAR PULSE"></a></h1>
      <nav>
        <ul>
          <li><a href="index.html#about">私たちについて</a></li>
          <li><a href="company.html">会社概要</a></li>
          <li><a href="index.html#news">お知らせ</a></li>
          <li><a href="index.html#recruit">採用サイト</a></li>
          <li><a href="contact.html">お問い合わせ</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="contact" class="sec_contact">
        <h2>お問い合わせ</h2>
        
        <form action="#" method="post">
          <table>
            <tr>
              <th><label for="name">お名前</label></th>
              <td>
                <input type="text" name="name" id="name" placeholder="例:山田 花子">
              </td>
            </tr>
            <tr>
              <th><label for="mail">メールアドレス</label></th>
              <td>
                <input type="email" name="mail" id="mail" placeholder="例:sample@example.com">
              </td>
            </tr>
            <tr>
              <th>性別</th>
              <td>
                <input type="radio" name="gender" value="man" id="man">
                <label for="man">男性</label>
                <input type="radio" name="gender" value="woman" id="woman">
                <label for="woman">女性</label>
                <input type="radio" name="gender" value="none" id="none">
                <label for="none">無回答</label>
              </td>
            </tr>
            <tr>
              <th>都道府県</th>
              <td>
                <select name="local" id="local">
                  <option>ここから選択してください</option>
                  <option value="sapporo">札幌</option>
                  <option value="tokyo">東京</option>
                  <option value="osaka">大阪</option>
                  <option value="kyoto">京都</option>
                </select>
              </td>
            </tr>
            <tr>
              <th>メルマガを希望する</th>
              <td>
                <input type="radio" name="magazine" value="yes" id="yes" checked>
                <label for="yes">希望する</label>
                <input type="radio" name="magazine" value="no" id="no">
                <label for="no">希望しない</label>
              </td>
            </tr>
            <tr>
              <th><label for="comment">ご意見・お問い合わせ</label></th>
              <td>
                <textarea name="comment" rows="6" id="comment" placeholder="ご意見・お問い合わせをこちらにご記入お願いします。"></textarea>
              </td>
            </tr>
            <tr>
              <td colspan="2" class="send">
                <input type="submit" value="送信ボタン">
                <input type="reset" value="リセットボタン">
              </td>
            </tr>
          </table>
        </form>
      </section>
    </main>

    <div class="pagetop_btn">
      <a href="#">↑</a>
    </div>

    <footer>
      <div class="ft_content">
        <h2><a href="index.html"><img src="images/drop_1.png" alt="CLEAR PULSE"></a></h2>
        <div class="ft_list_wrap">
          <ul>

            <li><a href="company.html">会社概要</a></li>
            <li><a href="index.html#news">お知らせ</a></li>
          </ul>
          <ul>
            <li><a href="index.html#recruit">採用サイト</a></li>
            <li><a href="contact.html">お問い合わせ</a></li>
          </ul>
        </div>
      </div>
      <small>2026 &copy; sample site.</small>
    </footer>

  </div>

</body>
</html>
